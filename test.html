<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>拖拽测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1a1a2e;touch-action:none}
canvas{display:block;touch-action:none;outline:3px solid #0f0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H, dpr;
let dragging = -1;
let blocks = [];
let offX=0, offY=0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  dpr = window.devicePixelRatio || 1;
  c.width = W * dpr;
  c.height = H * dpr;
  c.style.width = W + 'px';
  c.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // 画方块
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = i === dragging ? '#fff' : '#888';
    ctx.lineWidth = i === dragging ? 4 : 2;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
  }

  // 状态文字
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.fillText('方块数:' + blocks.length + ' 拖拽:' + dragging + ' 画布:' + W + 'x' + H + ' DPR:' + dpr, 10, 30);

  // 调试红点
  if (lastTouch) {
    ctx.fillStyle = 'red';
    ctx.beginPath();
    ctx.arc(lastTouch.x, lastTouch.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillText('('+lastTouch.x.toFixed(0)+','+lastTouch.y.toFixed(0)+')', lastTouch.x+14, lastTouch.y+4);
  }
}

let lastTouch = null;
function pos(e) {
  const r = c.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

c.addEventListener('pointerdown', e => {
  c.setPointerCapture(e.pointerId);
  lastTouch = pos(e);
  // 命中检测
  for (let i = blocks.length-1; i >= 0; i--) {
    const b = blocks[i];
    if (lastTouch.x >= b.x && lastTouch.x <= b.x+b.w &&
        lastTouch.y >= b.y && lastTouch.y <= b.y+b.h) {
      dragging = i;
      offX = lastTouch.x - b.x;
      offY = lastTouch.y - b.y;
      break;
    }
  }
  draw();
});

c.addEventListener('pointermove', e => {
  lastTouch = pos(e);
  if (dragging >= 0) {
    const b = blocks[dragging];
    b.x = lastTouch.x - offX;
    b.y = lastTouch.y - offY;
  }
  draw();
});

c.addEventListener('pointerup', e => {
  c.releasePointerCapture(e.pointerId);
  lastTouch = pos(e);
  dragging = -1;
  draw();
});

c.addEventListener('lostpointercapture', () => { dragging = -1; draw(); });

// 初始化方块
function init() {
  blocks = [
    { x: 50, y: 100, w: 100, h: 100, color: '#e74c3c' },
    { x: 200, y: 100, w: 100, h: 100, color: '#3498db' },
    { x: 50, y: 250, w: 100, h: 100, color: '#2ecc71' },
    { x: 200, y: 250, w: 100, h: 100, color: '#f39c12' },
  ];
  dragging = -1;
}

init();
resize();
window.addEventListener('resize', resize);
</script>
</body>
</html>
