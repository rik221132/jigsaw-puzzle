<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5B6ABF">
<link rel="manifest" href="manifest.json">
<title>拼图游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation;
  font-family:-apple-system,system-ui,sans-serif;
  background:#1a1a2e;color:#e0e0e0;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent}
/* 开始页 */
#start{padding:40px 20px;text-align:center;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:24px}
#start h1{font-size:2.2em;background:linear-gradient(135deg,#7B8AE0,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#upload-wrap{position:relative}
#upload-wrap input[type=file]{opacity:0;position:absolute;inset:0;cursor:pointer}
#upload-btn{display:inline-block;padding:14px 36px;background:#5B6ABF;border-radius:30px;font-size:1.1em;font-weight:600;color:#fff}
#upload-btn:active{transform:scale(.95)}
#preview-thumb{width:120px;height:120px;border-radius:16px;object-fit:cover;border:3px solid #5B6ABF;display:none}
#diff-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.diff-btn{padding:10px 20px;border:2px solid #444;border-radius:24px;background:transparent;color:#ccc;font-size:1em;cursor:pointer}
.diff-btn.selected{border-color:#7B8AE0;background:rgba(123,138,224,.2);color:#fff}
#start-btn{padding:14px 48px;background:#C084FC;border:none;border-radius:30px;font-size:1.2em;font-weight:700;color:#fff;cursor:pointer}
#start-btn:disabled{opacity:.35;pointer-events:none}
#start-btn:active{transform:scale(.95)}
/* 游戏页 */
#game{display:none;height:100%;flex-direction:column}
#bar{display:flex;justify-content:center;align-items:center;padding:8px 14px;background:#16213e;gap:12px;flex-shrink:0}
#bar span{font-size:.85em;white-space:nowrap}
.bar-btn{background:rgba(123,138,224,.25);border:none;color:#ccc;padding:6px 12px;border-radius:16px;font-size:.82em;cursor:pointer}
.bar-btn:active{background:rgba(123,138,224,.5)}
#canvas-wrap{flex:1;display:flex;justify-content:center;align-items:center;padding:10px}
canvas{display:block;touch-action:manipulation;border-radius:8px}
/* 裁剪页 */
#crop-screen{display:none;height:100%;flex-direction:column}
#crop-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#16213e;flex-shrink:0}
#crop-canvas-wrap{flex:1;display:flex;justify-content:center;align-items:center;padding:10px}
#crop-canvas{display:block;touch-action:none}
/* 原图浮层 */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10;justify-content:center;align-items:center}
#overlay img{max-width:90vw;max-height:80vh;border-radius:12px}
/* 胜利浮层 */
#win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:20;flex-direction:column;justify-content:center;align-items:center;gap:16px}
#win h2{font-size:2.8em}
#win p{font-size:1.15em;color:#aaa}
#win button{padding:12px 40px;background:#C084FC;border:none;border-radius:30px;font-size:1.15em;font-weight:700;color:#fff;cursor:pointer}
/* 安装条 */
#install-bar{position:fixed;bottom:0;left:0;right:0;background:#16213e;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:30;border-top:1px solid rgba(123,138,224,.4);font-size:.88em}
#install-btn{background:#5B6ABF;border:none;color:#fff;padding:8px 18px;border-radius:20px;font-weight:600;cursor:pointer}
#install-close{background:none;border:none;color:#888;font-size:1.2em;cursor:pointer;padding:4px 8px}
</style>
</head>
<body>

<div id="start">
  <h1>🧩 滑动拼图 <span style="font-size:.3em;color:#888">v12</span></h1>
  <div id="upload-wrap">
    <div id="upload-btn">📷 选择照片</div>
    <input type="file" accept="image/*" id="file-input">
  </div>
  <img id="preview-thumb" alt="预览">
  <div id="diff-row">
    <button class="diff-btn selected" data-n="3">3×3 入门</button>
    <button class="diff-btn" data-n="4">4×4 简单</button>
    <button class="diff-btn" data-n="5">5×5 中等</button>
    <button class="diff-btn" data-n="6">6×6 困难</button>
  </div>
  <button id="start-btn" disabled>开始游戏</button>
  <div id="install-hint" style="margin-top:8px;font-size:.78em;color:#888">
    <span id="install-text">📲 Chrome菜单 → 添加到主屏幕</span>
    <button id="install-manual-btn" style="display:none;background:#5B6ABF;color:#fff;border:none;padding:8px 20px;border-radius:20px;font-size:.9em;cursor:pointer">一键安装</button>
  </div>
</div>

<!-- 裁剪页 -->
<div id="crop-screen">
  <div id="crop-bar">
    <button class="bar-btn" id="crop-cancel">← 返回</button>
    <span style="font-size:.85em">拖动调整裁剪区域</span>
    <button class="bar-btn" id="crop-confirm" style="background:#C084FC;color:#fff;font-weight:600">确认 ✓</button>
  </div>
  <div id="crop-canvas-wrap">
    <canvas id="crop-canvas"></canvas>
  </div>
</div>

<div id="game">
  <div id="bar">
    <span>⏱ <b id="timer">00:00</b></span>
    <span>👆 <b id="moves">0</b>步</span>
    <span id="debug-info" style="font-size:.65em;color:#ff0"></span>
    <button class="bar-btn" id="hint-btn">👁 原图</button>
    <button class="bar-btn" id="restart-btn">🔄 重新打乱</button>
    <button class="bar-btn" id="home-btn">🏠</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
</div>

<div id="overlay"><img id="overlay-img" alt="原图"></div>

<div id="win">
  <h2>🎉 完成!</h2>
  <p>⏱ <span id="win-time"></span> · 👆 <span id="win-moves"></span>步</p>
  <button id="win-btn">再来一局</button>
</div>

<div id="install-bar" style="display:none">
  <span>📲 添加到桌面，像 App 一样用</span>
  <button id="install-btn">安装</button>
  <button id="install-close">✕</button>
</div>

<script>
// ========== DOM ==========
const $ = s => document.querySelector(s);
const startScr = $('#start'), gameScr = $('#game');
const fileInp = $('#file-input'), previewThumb = $('#preview-thumb'), startBtn = $('#start-btn');
const canvas = $('#c'), ctx = canvas.getContext('2d');
const timerEl = $('#timer'), movesEl = $('#moves');
const overlay = $('#overlay'), overlayImg = $('#overlay-img');
const winScr = $('#win'), winTime = $('#win-time'), winMoves = $('#win-moves');
const installBar = $('#install-bar'), installBtn = $('#install-btn');

// ========== PWA 安装 ==========
let deferredPrompt = null;
const installText = $('#install-text'), installManualBtn = $('#install-manual-btn');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBar.style.display = 'flex';
  installText.style.display = 'none';
  installManualBtn.style.display = 'inline-block';
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  if ((await deferredPrompt.userChoice).outcome === 'accepted') { installBar.style.display = 'none'; installManualBtn.style.display = 'none'; }
  deferredPrompt = null;
});
installManualBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  if ((await deferredPrompt.userChoice).outcome === 'accepted') { installBar.style.display = 'none'; installManualBtn.style.display = 'none'; }
  deferredPrompt = null;
});
$('#install-close').addEventListener('click', () => { installBar.style.display = 'none'; });
window.addEventListener('appinstalled', () => { installBar.style.display = 'none'; installText.textContent = '✅ 已添加到桌面'; });
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ========== 游戏状态 ==========
let image = null, rawImage = null, gridN = 3;
let pieces = [];        // [{id, correctR, correctC, curR, curC}]
let emptyR, emptyC;     // 空位位置
let boardX=0, boardY=0, cellSize=0, boardSize=0;
let canvasW=0, canvasH=0;
let moves=0, timerSec=0, timerId=null;
let solved=false, gameInited=false;

// 裁剪状态
const cropCanvas = $('#crop-canvas'), cropCtx = cropCanvas.getContext('2d');
let cropX=0, cropY=0, cropSize=0; // 裁剪框在图片上的位置和大小
let cropDragging=false, cropDragStart=null, cropDragOrig={x:0,y:0};

// ========== 难度选择 ==========
document.querySelectorAll('.diff-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('selected'));
    b.classList.add('selected');
    gridN = +b.dataset.n;
  });
});

// ========== 照片上传 ==========
fileInp.addEventListener('change', () => {
  const f = fileInp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    const img = new Image();
    img.onload = () => { rawImage = img; previewThumb.src = r.result; previewThumb.style.display='block'; startBtn.disabled = false; };
    img.src = r.result;
  };
  r.readAsDataURL(f);
});

// ========== 核心逻辑 ==========
function getNeighbors(r, c) {
  const res = [];
  if (r > 0) res.push({r: r-1, c});
  if (r < gridN-1) res.push({r: r+1, c});
  if (c > 0) res.push({r, c: c-1});
  if (c < gridN-1) res.push({r, c: c+1});
  return res;
}

function swap(r1, c1, r2, c2) {
  // 交换两个格子的碎片
  const p1 = pieces.find(p => p.curR === r1 && p.curC === c1);
  const p2 = pieces.find(p => p.curR === r2 && p.curC === c2);
  if (p1) { p1.curR = r2; p1.curC = c2; }
  if (p2) { p2.curR = r1; p2.curC = c1; }
  // 更新空位
  if (r1 === emptyR && c1 === emptyC) { emptyR = r2; emptyC = c2; }
  else if (r2 === emptyR && c2 === emptyC) { emptyR = r1; emptyC = c1; }
}

function shuffle() {
  // 从正确状态出发，做随机有效移动来打乱
  for (let i = 0; i < gridN * gridN * 30; i++) {
    const nb = getNeighbors(emptyR, emptyC);
    const pick = nb[Math.floor(Math.random() * nb.length)];
    swap(emptyR, emptyC, pick.r, pick.c);
  }
}

function checkWin() {
  return pieces.every(p => p.curR === p.correctR && p.curC === p.correctC);
}

function getGridCell(cx, cy) {
  const col = Math.floor((cx - boardX) / cellSize);
  const row = Math.floor((cy - boardY) / cellSize);
  if (row >= 0 && row < gridN && col >= 0 && col < gridN) return {row, col};
  return null;
}

// ========== 渲染 ==========
function render() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvasW, canvasH);

  // 背景
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvasW, canvasH);

  // 拼图板
  const pad = 6;
  ctx.fillStyle = 'rgba(255,255,255,.06)';
  ctx.strokeStyle = 'rgba(255,255,255,.2)';
  ctx.lineWidth = 2;
  roundRect(boardX-pad, boardY-pad, boardSize+pad*2, boardSize+pad*2, 10);

  // 画每个碎片（无缝拼接，无圆角，无间隙）
  for (const p of pieces) {
    const x = boardX + p.curC * cellSize;
    const y = boardY + p.curR * cellSize;
    const srcCell = image.naturalWidth / gridN;
    const sx = p.correctC * srcCell;
    const sy = p.correctR * srcCell;
    ctx.drawImage(image, sx, sy, srcCell, srcCell, x, y, cellSize, cellSize);
  }

  // 碎片之间的细线（仅视觉分隔，不砍图片）
  ctx.strokeStyle = 'rgba(0,0,0,.15)';
  ctx.lineWidth = 0.5;
  for (let r = 1; r < gridN; r++) {
    const y = boardY + r * cellSize;
    ctx.beginPath(); ctx.moveTo(boardX, y); ctx.lineTo(boardX + boardSize, y); ctx.stroke();
  }
  for (let c = 1; c < gridN; c++) {
    const x = boardX + c * cellSize;
    ctx.beginPath(); ctx.moveTo(x, boardY); ctx.lineTo(x, boardY + boardSize); ctx.stroke();
  }

  // 空位标记（虚线框）
  const ex = boardX + emptyC * cellSize;
  const ey = boardY + emptyR * cellSize;
  ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1.5;
  roundRect(ex+2, ey+2, cellSize-4, cellSize-4, 4);
  ctx.setLineDash([]);

  if (solved) {
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.fillRect(boardX, boardY, boardSize, boardSize);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${cellSize*0.5}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🎉', boardX+boardSize/2, boardY+boardSize/2+cellSize*0.15);
  }

  // DEBUG: 图片信息
  const iw = image ? image.naturalWidth : 0;
  const ih = image ? image.naturalHeight : 0;
  const dbi = $('#debug-info');
  if (dbi) dbi.textContent = `图${iw}x${ih} 源${(iw/gridN)|0}px 板${(boardSize)|0}`;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
}

// ========== 触摸 / 点击 ==========
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener('pointerdown', e => {
  if (solved) return;
  const pos = getCanvasPos(e);
  const cell = getGridCell(pos.x, pos.y);
  if (!cell) return;

  const {row, col} = cell;
  // 检查是否与空位相邻
  if (Math.abs(row - emptyR) + Math.abs(col - emptyC) !== 1) return;
  // 不能是空位本身
  if (row === emptyR && col === emptyC) return;

  swap(row, col, emptyR, emptyC);
  moves++;
  movesEl.textContent = moves;
  if (!timerId) startTimer();

  if (checkWin()) {
    solved = true;
    stopTimer();
    winTime.textContent = timerEl.textContent;
    winMoves.textContent = moves;
    setTimeout(() => { winScr.style.display = 'flex'; }, 400);
  }
  render();
});

// ========== 计时器 ==========
function startTimer() {
  if (timerId) return;
  timerId = setInterval(() => {
    timerSec++;
    const m = Math.floor(timerSec / 60).toString().padStart(2, '0');
    const s = (timerSec % 60).toString().padStart(2, '0');
    timerEl.textContent = m + ':' + s;
  }, 1000);
}
function stopTimer() { clearInterval(timerId); timerId = null; }

// ========== 游戏初始化 ==========
function initGame() {
  // 改道：先进入裁剪页
  if (!rawImage || gameInited) return;
  showCropScreen();
}

// ========== 裁剪页 ==========
function showCropScreen() {
  const barH = 48;
  const cw = window.innerWidth;
  const ch = window.innerHeight - barH;
  cropCanvas.width = cw * (window.devicePixelRatio || 1);
  cropCanvas.height = ch * (window.devicePixelRatio || 1);
  cropCanvas.style.width = cw + 'px';
  cropCanvas.style.height = ch + 'px';

  // 初始裁剪框：取图片中心最大正方形
  const iw = rawImage.naturalWidth, ih = rawImage.naturalHeight;
  cropSize = Math.min(iw, ih);
  cropX = (iw - cropSize) / 2;
  cropY = (ih - cropSize) / 2;

  startScr.style.display = 'none';
  $('#crop-screen').style.display = 'flex';
  renderCrop();
}

function renderCrop() {
  const dpr = window.devicePixelRatio || 1;
  const cw = parseInt(cropCanvas.style.width);
  const ch = parseInt(cropCanvas.style.height);
  cropCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cropCtx.clearRect(0, 0, cw, ch);
  cropCtx.fillStyle = '#000';
  cropCtx.fillRect(0, 0, cw, ch);

  // 整张图缩放到适配屏幕
  const imgScale = Math.min(cw / rawImage.naturalWidth, ch / rawImage.naturalHeight);
  const imgDrawW = rawImage.naturalWidth * imgScale;
  const imgDrawH = rawImage.naturalHeight * imgScale;
  const imgDrawX = (cw - imgDrawW) / 2;
  const imgDrawY = (ch - imgDrawH) / 2;

  cropCtx.drawImage(rawImage, imgDrawX, imgDrawY, imgDrawW, imgDrawH);

  // 裁剪框 = 图片位置 + crop 偏移 * 缩放
  const boxX = imgDrawX + cropX * imgScale;
  const boxY = imgDrawY + cropY * imgScale;
  const boxW = cropSize * imgScale;
  const boxH = cropSize * imgScale;

  // 半透明遮罩
  cropCtx.fillStyle = 'rgba(0,0,0,.55)';
  cropCtx.fillRect(0, 0, cw, boxY);
  cropCtx.fillRect(0, boxY, boxX, boxH);
  cropCtx.fillRect(boxX+boxW, boxY, cw-boxX-boxW, boxH);
  cropCtx.fillRect(0, boxY+boxH, cw, ch-boxY-boxH);

  // 裁剪框边框
  cropCtx.strokeStyle = '#fff';
  cropCtx.lineWidth = 2.5;
  cropCtx.strokeRect(boxX, boxY, boxW, boxH);
  // 角标
  const cl = 16;
  cropCtx.strokeStyle = '#C084FC';
  cropCtx.lineWidth = 3;
  [{x:boxX,y:boxY},{x:boxX+boxW,y:boxY},{x:boxX,y:boxY+boxH},{x:boxX+boxW,y:boxY+boxH}].forEach(p => {
    cropCtx.beginPath();
    cropCtx.moveTo(p.x, p.y+cl); cropCtx.lineTo(p.x, p.y); cropCtx.lineTo(p.x+cl, p.y);
    cropCtx.stroke();
  });
}

// 裁剪页 — 单指拖拽 + 双指缩放
let pinchStartDist = 0, pinchStartSize = 0, pinchMidX = 0, pinchMidY = 0;
cropCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    cropDragging = true;
    cropDragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    cropDragOrig = { x: cropX, y: cropY };
  } else if (e.touches.length === 2) {
    cropDragging = false;
    pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    pinchStartSize = cropSize;
    pinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    pinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  }
}, { passive: false });
cropCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && pinchStartDist > 0) {
    // 双指缩放
    const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const ratio = pinchStartDist / newDist;
    const newSize = Math.round(pinchStartSize * ratio);
    const minSize = 80;
    const maxSize = Math.min(rawImage.naturalWidth, rawImage.naturalHeight);
    const oldSize = cropSize;
    cropSize = Math.max(minSize, Math.min(maxSize, newSize));
    // 以双指中点为中心缩放
    if (cropSize !== oldSize) {
      const cw = parseInt(cropCanvas.style.width);
      const ch = parseInt(cropCanvas.style.height);
      const imgScale = Math.min(cw / rawImage.naturalWidth, ch / rawImage.naturalHeight);
      const cx = pinchMidX; const cy = pinchMidY;
      const cpX = (cx - (cw - rawImage.naturalWidth * imgScale) / 2) / imgScale;
      const cpY = (cy - (ch - rawImage.naturalHeight * imgScale) / 2) / imgScale;
      cropX = Math.max(0, Math.min(rawImage.naturalWidth - cropSize, cpX - cropSize / 2));
      cropY = Math.max(0, Math.min(rawImage.naturalHeight - cropSize, cpY - cropSize / 2));
    }
    renderCrop();
  } else if (e.touches.length === 1 && cropDragging) {
    // 单指拖拽
    const cw = parseInt(cropCanvas.style.width);
    const ch = parseInt(cropCanvas.style.height);
    const imgScale = Math.min(cw / rawImage.naturalWidth, ch / rawImage.naturalHeight);
    const dx = (e.touches[0].clientX - cropDragStart.x) / imgScale;
    const dy = (e.touches[0].clientY - cropDragStart.y) / imgScale;
    cropX = Math.max(0, Math.min(rawImage.naturalWidth - cropSize, cropDragOrig.x + dx));
    cropY = Math.max(0, Math.min(rawImage.naturalHeight - cropSize, cropDragOrig.y + dy));
    renderCrop();
  }
}, { passive: false });
cropCanvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    cropDragging = false;
    pinchStartDist = 0;
  }
});

$('#crop-confirm').addEventListener('click', () => {
  // 裁剪图片
  const srcDim = cropSize;
  const outDim = Math.min(srcDim, 1024);
  const tc = document.createElement('canvas'); tc.width = outDim; tc.height = outDim;
  tc.getContext('2d').drawImage(rawImage, cropX, cropY, srcDim, srcDim, 0, 0, outDim, outDim);
  image = new Image();
  image.onload = () => doStart();
  image.src = tc.toDataURL('image/jpeg', 0.9);
  if (image.complete) doStart();
});

$('#crop-cancel').addEventListener('click', () => {
  $('#crop-screen').style.display = 'none';
  startScr.style.display = 'flex';
});

function doStart() {
  gameInited = true;
  $('#crop-screen').style.display = 'none';
  gameScr.style.display = 'flex';
  stopTimer(); timerSec = 0; moves = 0; solved = false;
  timerEl.textContent = '00:00'; movesEl.textContent = '0';
  canvasW = window.innerWidth;
  canvasH = window.innerHeight - ($('#bar').offsetHeight || 48);
  computeLayout();
  createPieces();
  render();
}

function computeLayout() {
  boardSize = Math.min(canvasW * 0.88, canvasH * 0.62);
  cellSize = boardSize / gridN;
  boardX = (canvasW - boardSize) / 2;
  boardY = Math.max(4, (canvasH - boardSize) / 2 - canvasH * 0.05);
}

function createPieces() {
  pieces = [];
  for (let r = 0; r < gridN; r++) {
    for (let c = 0; c < gridN; c++) {
      if (r === gridN-1 && c === gridN-1) continue;
      pieces.push({ id: r*gridN+c, correctR: r, correctC: c, curR: r, curC: c });
    }
  }
  emptyR = gridN - 1; emptyC = gridN - 1;
  shuffle();
}

function restartGame() {
  stopTimer(); timerSec = 0; moves = 0; solved = false;
  timerEl.textContent = '00:00'; movesEl.textContent = '0';
  createPieces();
  render();
}

// ========== 按钮 ==========
startBtn.addEventListener('click', initGame);
$('#restart-btn').addEventListener('click', restartGame);
$('#home-btn').addEventListener('click', () => {
  stopTimer(); gameScr.style.display='none'; startScr.style.display='flex'; gameInited=false;
  startBtn.disabled = !rawImage;
});
$('#hint-btn').addEventListener('click', () => {
  overlayImg.src = image?.src; overlay.style.display='flex';
});
overlay.addEventListener('click', () => overlay.style.display='none');
$('#win-btn').addEventListener('click', () => { winScr.style.display='none'; restartGame(); });

// ========== resize ==========
let resizeTm = null;
window.addEventListener('resize', () => {
  if (gameScr.style.display === 'none') return;
  clearTimeout(resizeTm);
  resizeTm = setTimeout(() => {
    canvasW = window.innerWidth;
    canvasH = window.innerHeight - ($('#bar').offsetHeight || 48);
    computeLayout();
    render();
  }, 250);
});
</script>
</body>
</html>
